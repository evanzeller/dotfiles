set -g default-terminal "tmux-256color"

set-option -gas terminal-overrides "*:Tc" # true color support
set-option -gas terminal-overrides "*:RGB" # true color support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0
set -sg escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g focus-events on
setw -g aggressive-resize on
set -g status-interval 1

set -g prefix C-a
unbind C-b
bind C-a send-prefix
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'rose-pine/tmux'
# set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @plugin 'uhs-robert/tmux-oasis'
set -g @oasis_flavor "rose"  # Optional: defaults to lagoon_dark
# set -g @continuum-restore 'on'
# set -g @rose_pine-variant 'main'
#
set -g @tmux-dotbar-bg '#1F1F1F'
set -g @tmux-dotbar-fg '#AEAFAD'
set -g @tmux-dotbar-fg-current '#D4D4D4'

setw -g status-keys vi
setw -g mode-keys vi
setw -g monitor-activity on

bind-key v split-window -h
bind-key s split-window -v

bind -T copy-mode-vi v send-keys -X begin-selection
if-shell 'uname -s | grep -q Darwin' \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'"

bind r source-file ~/.tmux.conf
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vim style pane selection
bind ^ last-window
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
